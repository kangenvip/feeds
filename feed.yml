<description>ИОНИЗАТОР ВОДЫ КАНГЕН АППАРАТ Leveluk JR IVLeveluk JR IV - многофункциональный надежный ионизатор Канген Воды, отличный источник антиоксидантов! Это одно из красивых устройств для получения воды Kangen и хорошее предложение в линейке машин Kangen. Полноценный прибор, производящий вкусную ионизированную, щелочную воду с антиоксидантными свойствами, можно купить у нас. Лучшая цена от производителя! LeveLuk Jr IV одна из новых моделей ионизаторов от Enagic – выпуск 2020 года. Новый внешний вид прибора сочетает в себе стильный дизайн и хорошую производительность. LeveLuk Jr IV стал лучшим прибором в классе бюджетных аппаратов Enagic и заменил 2 цветные модели — LeveLuk Jr II и LeveLuk R, выпуск которых был закончен в начале 2021г. Прибор достаточно компактен и идеально подойдет для любой кухни. Легко держать к смесителю водопроводного крана на кухне. Не занимает много места на столешнице, может свободно разместиться в кухонном шкафу. Прибор последовательно всех семи видов канген-воды с физико-химическими признаками, проявляющимися в неограниченном количестве, как и в других моделях Enagic. Водой вы можете поделиться со своими родными и близкими, т.к. Измерение мощности достаточно, чтобы канген-вода сохраняла целебные свойства в течение 24 часов. Щелочность сохраняется месяцами. LeveLuk Jr IV укомплектован фильтром доочистки в потоке воды, электролизной розеткой, а также системой автоматической и постоянной чистки камеры ионизации (электродов). Аппаратом можно управлять, благодаря жидкокристаллическому плею, цветным кнопкам дисм и звуковым сигналам. На ЖК-экране были созданы команды управления аппаратом в текстовом виде. Кроме текстовых команд, прибор имеет и звуковое управление (голосовые подсказки не предусмотрены). Машина-хороший выбор для холостых людей, для небольшой семьи или за небольшие деньги! В перспективе можно рассмотреть возможность приобретения более мощного и продвинутого оборудования. Если вам нужен такой прибор, если вы хотите более современную машину, тогда рассмотрите флагман нашей модельной линейки — LeveLuk K8. LeveLuk Jr IV - это энергосберегающая модель. В отличие от старших моделей аппаратов Enagic, у него 4 титановых электрода с покрытием платиной и 3 камеры ионизации. Это снижает потребление энергии при электролизе. Аппарат обеспечивает достаточную производительность. Пластины-электроды улучшают процесс ионизации воды и повышают ее антиоксидантный производственный потенциал. Большая поверхность сплошных титановых электродов позволяет получать кангеновую воду с соблюдением принципов принципа. Показатели воды тем стабильнее и лучше, чем большее количество пластин-электродов замедляется в процессе ионизации, чем больше сама площадь пластины, через которую проходит вода. Как и в других моделях приборов, при создании данной машины были использованы инновационные технологии. Вы постоянно чистую, вкусную, щелочную, водородную, структурированную, целебную питьевую воду с Отрицательным ОВП (до минус 500мВ), на потоке,мгновенно, в любом количестве и когда возникнет мысль! Модель LeveLuk Jr IV скорее будет удачной и выгодной покупкой только для домашнего эксплуатации, т.к. его 4 пластины в камере электролиза не могут считать такую ​​же сильную воду по отрицательному ОВП и составу растворенного молекулярного белка, как более мощные приборы. Аппараты с 7 или 8 электродами (SD501 и К8) производят воду, способную сохранить свои антиоксидантные свойства в течение 2–3 суток, а 4 пластинчатый прибор Jr IV может обеспечить менее сильную кангеновую воду. Ее свойства указаны на 1 сутки (отрицательный заряд ОВП). Водорода в воде тоже будет меньше. КАЧЕСТВО И ТИПЫ КАНГЕН ВОДЫLeveluk JRIV производит 5 типов (7 видов) воды:* Нейтральную Канген воду (7.0pH),* Щелочную воду Kangen Water (8.5 - 9,0 - 9.5pH),* Кислую Канген воду или Воду красоты (4.0 - 6.0рН),* Сильнокислую Канген воду (2.5pH),* Сильнощелочную Канген вода (11,0-12,0pH). ПРОИЗВОДИТЕЛЬНОСТЬ АППАРАТА* Нейтральная питьевая Канген-вода: 2,0 – 3,0 л/мин* Питьевая щелочная Канген-вода: 2,0 – 3,0 л/мин.* Кислая вода - Бьюти-вода: 0,3 – 1,9 до 2,6 л/мин.* Сильнокислая дезинфицирующая вода: 0,3 – 0,7 л/мин.* Сильнощелочная вода: 0,7 - 1,5 л/мин. ОТРИЦАТЕЛЬНЫЙ ОВПОкислительно-Восстановительный Потенциал (ОВП, мВ) зависит от качества воды и скорости потока. Могут быть устройства от -100мВ до -500мВ. ЧИСТКА АППАРАТА И УХОДУ Leveluk JR IV Устроен автоматический и ручной (принудительный) способ чистки. Это особенно актуально для регионов с жесткой водой. Чтобы приборы всегда производили свежую живую щелочную воду с соблюдением заявленных условий, их необходимо очищать. Кроме ежемесячной чистки Канген аппарату необходимо проводить сервисное обслуживание и глубокую чистку 1 раз в 6-12 месяцев. Проводит специалист с опытом обслуживания канген аппаратов. Обращайтесь по телефону +7(926) 565-3661. ФИЛЬТРАЦИЯ ВХОДЯЩЕЙ ВОДЫ Норма замены фильтра: 6 000–12 000 литров. Зависит от качества водопроводной воды. Для того чтобы фильтр служил дольше, воспользуйтесь фильтрами предварительной очистки! Полное описание, технические характеристики и дополнительная сравнительная информация смотрите ЗДЕСЬ</description>* Сильнощелочную Кангеновую воду (11,0-12,0pH). ПРОИЗВОДИТЕЛЬНОСТЬ АППАРАТА* Нейтральная питьевая Канген-вода: 2,0 – 3,0 л/мин* Питьевая щелочная Канген-вода: 2,0 – 3,0 л/мин.* Кислая вода - Бьюти-вода: 0,3 – 1,9 до 2,6 л/мин.* Сильнокислая дезинфицирующая вода: 0,3 – 0,7 л/мин.* Сильнощелочная вода: 0,7 - 1,5 л/мин. ОТРИЦАТЕЛЬНЫЙ ОВПОкислительно-Восстановительный Потенциал (ОВП, мВ) зависит от качества воды и скорости потока. Могут быть устройства от -100мВ до -500мВ. ЧИСТКА АППАРАТА И УХОДУ Leveluk JR IV Устроен автоматический и ручной (принудительный) способ чистки. Это особенно актуально для регионов с жесткой водой. Чтобы приборы всегда производили свежую живую щелочную воду с соблюдением заявленных условий, их необходимо очищать. Кроме ежемесячной чистки Канген аппарату необходимо проводить сервисное обслуживание и глубокую чистку 1 р