ивертор находится в «носике» основного смесителя на х/г воде. К дивертору крепится трубка от канген-устройства. Такое подключение не всегда эстетично выглядит, особенно в эксклюзивных вариантах кухни и мойки. Есть возможность того, что на канген-аппарате кто-то выпустит горячую воду, после чего нужно будет заменить фильтр в приборе. Если главный смеситель на мойке выполнен в эксклюзивном исполнении, тогда бывает трудно или невозможно подключить прибор с таким способом с помощью дивертора. Эти проблемы можно успешно решить с помощью адаптированного спецкрана для Канген-аппаратов. Нашим клиентам мы помогаем подключать кангеновые аппараты разными способами, а также подбирать и хранить современные фильтрующие системы. Телефон для связи +7 (926) 954-4100.</description>
